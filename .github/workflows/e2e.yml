# DICA Decorator — Pipeline E2E (Playwright)
#
# Mise en place LOT 4 vague 1 : filet anti-régression de caractérisation des
# pages monolithiques (Creative, Auth, ProjectDetail, Admin, Dashboard) AVANT
# les refactos de complexité cognitive prévus en vague 2.
#
# Déclenchement MANUEL (workflow_dispatch) volontairement : la suite E2E
# requiert des secrets (Supabase + compte de test) et n'a pas vocation à
# bloquer chaque PR tant que la vague 2 n'est pas lancée. Les tests des pages
# protégées sont SKIP proprement si les secrets E2E_TEST_* sont absents.
#
# Secrets attendus (Repository settings → Secrets and variables → Actions) :
#   - VITE_SUPABASE_URL              (obligatoire pour démarrer l'app)
#   - VITE_SUPABASE_PUBLISHABLE_KEY  (obligatoire pour démarrer l'app)
#   - E2E_TEST_EMAIL                 (parcours authentifiés ; sinon SKIP)
#   - E2E_TEST_PASSWORD              (parcours authentifiés ; sinon SKIP)
#
# Auteur : KOREV AI

name: E2E (Playwright)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright — caractérisation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies (clean install)
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          CI: 'true'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
