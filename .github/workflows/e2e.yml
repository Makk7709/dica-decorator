# DICA Decorator — Pipeline E2E (Playwright)
#
# Mise en place LOT 4 vague 1 : filet anti-régression de caractérisation des
# pages monolithiques (Creative, Auth, ProjectDetail, Admin, Dashboard).
#
# ACTIVATION LOT 5 : déclenchement AUTOMATIQUE sur `pull_request` et sur
# `push` des branches principales, tout en conservant `workflow_dispatch`.
#
# Gestion de l'ABSENCE de credentials (auto-suffisance) :
#   - La page /auth est PUBLIQUE : `e2e/auth.spec.ts` (6 tests) tourne avec des
#     valeurs PLACEHOLDER `VITE_SUPABASE_*` injectées ci-dessous (aucun appel
#     réseau au chargement). Si les secrets `VITE_SUPABASE_*` existent, ils
#     priment ; sinon on retombe sur les placeholders publics.
#   - Les specs des pages PROTÉGÉES (Creative, ProjectDetail, Admin, Dashboard)
#     restent SKIP tant que `E2E_TEST_EMAIL` / `E2E_TEST_PASSWORD` sont absents
#     (lecture optionnelle des secrets, sans casser la CI).
#
# Secrets FACULTATIFS (Repository settings → Secrets and variables → Actions) :
#   - VITE_SUPABASE_URL              (sinon placeholder public)
#   - VITE_SUPABASE_PUBLISHABLE_KEY  (sinon placeholder public)
#   - E2E_TEST_EMAIL                 (parcours authentifiés ; sinon SKIP)
#   - E2E_TEST_PASSWORD              (parcours authentifiés ; sinon SKIP)
#
# Auteur : KOREV AI

name: E2E (Playwright)

on:
  push:
    branches: [main, develop, audit/tier1-2026-05-07]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright — caractérisation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies (clean install)
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          CI: 'true'
          # Placeholders publics par défaut : la page /auth démarre sans backend.
          # Les secrets, s'ils existent, priment (parcours réels).
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'placeholder-anon-key' }}
          # Lecture optionnelle : si absents, les specs protégées restent SKIP.
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
