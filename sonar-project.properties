# SonarQube / SonarLint configuration — DICA Decorator
#
# Réf. ADR : docs/adr/0001-exclusion-shadcn-ui-de-l-audit-sonar.md
# Date : 2026-06-06
# Mainteneur : KOREV AI
#
# Pour scanner localement avec sonar-scanner :
#   sonar-scanner -Dsonar.login=<token> -Dsonar.host.url=<url>
#
# La présente configuration est aussi lue par SonarLint (extension IDE)
# qui appliquera automatiquement les exclusions.

sonar.projectKey=korev-ai_dica-decorator
sonar.projectName=DICA Decorator
sonar.projectVersion=2.2.0
sonar.organization=korev-ai

# ----------------------------------------------------------------------
# Périmètre d'analyse
# ----------------------------------------------------------------------

sonar.sources=src,supabase/functions
sonar.tests=src,supabase/functions
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/__tests__/**
sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=tsconfig.json

# ----------------------------------------------------------------------
# Exclusions générales (code généré ou hors périmètre métier)
# ----------------------------------------------------------------------

sonar.exclusions=\
  src/integrations/supabase/types.ts,\
  dist/**,\
  dist-ssr/**,\
  build/**,\
  coverage/**,\
  audit/**,\
  node_modules/**,\
  public/**,\
  .vite/**,\
  src/components/ui/accordion.tsx,\
  src/components/ui/alert-dialog.tsx,\
  src/components/ui/alert.tsx,\
  src/components/ui/aspect-ratio.tsx,\
  src/components/ui/avatar.tsx,\
  src/components/ui/badge.tsx,\
  src/components/ui/breadcrumb.tsx,\
  src/components/ui/button.tsx,\
  src/components/ui/calendar.tsx,\
  src/components/ui/card.tsx,\
  src/components/ui/carousel.tsx,\
  src/components/ui/chart.tsx,\
  src/components/ui/checkbox.tsx,\
  src/components/ui/collapsible.tsx,\
  src/components/ui/command.tsx,\
  src/components/ui/context-menu.tsx,\
  src/components/ui/dialog.tsx,\
  src/components/ui/drawer.tsx,\
  src/components/ui/dropdown-menu.tsx,\
  src/components/ui/form.tsx,\
  src/components/ui/hover-card.tsx,\
  src/components/ui/input.tsx,\
  src/components/ui/input-otp.tsx,\
  src/components/ui/label.tsx,\
  src/components/ui/menubar.tsx,\
  src/components/ui/navigation-menu.tsx,\
  src/components/ui/pagination.tsx,\
  src/components/ui/popover.tsx,\
  src/components/ui/progress.tsx,\
  src/components/ui/radio-group.tsx,\
  src/components/ui/resizable.tsx,\
  src/components/ui/scroll-area.tsx,\
  src/components/ui/select.tsx,\
  src/components/ui/separator.tsx,\
  src/components/ui/sheet.tsx,\
  src/components/ui/sidebar.tsx,\
  src/components/ui/skeleton.tsx,\
  src/components/ui/slider.tsx,\
  src/components/ui/sonner.tsx,\
  src/components/ui/switch.tsx,\
  src/components/ui/table.tsx,\
  src/components/ui/tabs.tsx,\
  src/components/ui/textarea.tsx,\
  src/components/ui/toast.tsx,\
  src/components/ui/toaster.tsx,\
  src/components/ui/toggle.tsx,\
  src/components/ui/toggle-group.tsx,\
  src/components/ui/tooltip.tsx,\
  src/components/ui/use-toast.ts

# Note : src/components/ui/ contient aussi 10 composants custom du projet
# (app-footer, before-after-slider, image-export-dropdown,
#  magazine-deco-export-button, premium-layout, presentation-viewer,
#  reseller-brochure-export-button, safe-image, share-link-dialog,
#  theme-toggle) qui ne sont PAS exclus et restent dans le périmètre
# d'audit normal. Cf. ADR 0001 § 2.

# ----------------------------------------------------------------------
# Exclusions de couverture (les tests eux-mêmes ne sont pas mesurés)
# ----------------------------------------------------------------------

sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/__tests__/**,\
  src/test/**,\
  src/main.tsx,\
  src/vite-env.d.ts,\
  src/integrations/supabase/types.ts,\
  src/components/ui/**

# ----------------------------------------------------------------------
# Exclusions de duplication (code répétitif acceptable)
# ----------------------------------------------------------------------

sonar.cpd.exclusions=\
  src/integrations/supabase/types.ts,\
  src/components/ui/**,\
  supabase/migrations/**

# ----------------------------------------------------------------------
# Rapport de couverture
# ----------------------------------------------------------------------

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ----------------------------------------------------------------------
# Quality gate
# ----------------------------------------------------------------------

# Le quality gate sera défini formellement dans l'ADR 0002 (LOT 5).
# En attendant, mode "report only" : Sonar mesure mais ne bloque pas la CI.
